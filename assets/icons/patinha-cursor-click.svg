<svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 32 32">
  <!-- Tracinhos de efeito de clique -->
  <line x1="2" y1="6" x2="5" y2="8" stroke="#c99a4a" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="30" y1="6" x2="27" y2="8" stroke="#c99a4a" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="1" y1="18" x2="4.5" y2="18" stroke="#c99a4a" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="31" y1="18" x2="27.5" y2="18" stroke="#c99a4a" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="16" y1="0" x2="16" y2="3" stroke="#c99a4a" stroke-width="1.6" stroke-linecap="round"/>

  <g transform="rotate(-20 16 16)">
    <!-- Almofada central (mais achatada, como se estivesse pressionando) -->
