    <ellipse cx="16" cy="21" rx="5.3" ry="3.6" fill="#fce8ee"/>
    <!-- Dedinhos (levemente recolhidos) -->
    <ellipse cx="7.5" cy="14" rx="3" ry="3.4" fill="#4a3220"/>
    <ellipse cx="7.5" cy="14" rx="1.6" ry="2" fill="#fce8ee"/>

    <ellipse cx="14" cy="9.5" rx="3.2" ry="3.7" fill="#4a3220"/>
    <ellipse cx="14" cy="9.5" rx="1.7" ry="2.2" fill="#fce8ee"/>

    <ellipse cx="21" cy="9.5" rx="3.2" ry="3.7" fill="#4a3220"/>
    <ellipse cx="21" cy="9.5" rx="1.7" ry="2.2" fill="#fce8ee"/>

    <ellipse cx="27.5" cy="14" rx="3" ry="3.4" fill="#4a3220"/>
    <ellipse cx="27.5" cy="14" rx="1.6" ry="2" fill="#fce8ee"/>
  </g>
</svg>
